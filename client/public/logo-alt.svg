<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon: Geometric compression concept -->
  <g transform="translate(10, 10)">
    <!-- Background circle -->
    <circle cx="20" cy="20" r="20" fill="url(#logoGradient)"/>
    
    <!-- Large square (original) -->
    <rect x="8" y="8" width="16" height="16" rx="2" fill="white" opacity="0.9"/>
    
    <!-- Smaller square (compressed) overlapping -->
    <rect x="16" y="16" width="12" height="12" rx="1.5" fill="url(#accentGradient)" opacity="0.95"/>
    
    <!-- Compression indicator lines -->
    <path d="M 6 12 L 10 12" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 6 16 L 10 16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 6 20 L 10 20" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Compressed lines (fewer) -->
    <path d="M 18 18 L 22 18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M 18 22 L 22 22" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Compression arrow -->
    <path d="M 12 24 L 16 24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 14 22 L 16 24 L 14 26" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text: PixelSqueeze -->
  <text x="50" y="25" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="#1F2937">
    Pixel
  </text>
  <text x="50" y="42" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="url(#logoGradient)">
    Squeeze
  </text>
  
  <!-- Tagline -->
  <text x="50" y="54" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="400" fill="#6B7280">
    Smart Image Compression
  </text>
</svg> 