<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon: Stylized PS monogram with compression concept -->
  <g transform="translate(10, 10)">
    <!-- Background circle -->
    <circle cx="20" cy="20" r="20" fill="url(#logoGradient)"/>
    
    <!-- Stylized P -->
    <path d="M 12 8 L 12 32 L 20 32 C 24 32 26 30 26 26 C 26 22 24 20 20 20 L 16 20 L 16 8 Z" fill="white"/>
    
    <!-- Stylized S (compressed) -->
    <path d="M 28 12 C 28 10 30 8 32 8 L 36 8 L 36 12 L 32 12 C 31 12 30 13 30 14 C 30 15 31 16 32 16 L 36 16 L 36 20 L 32 20 C 30 20 28 18 28 16" fill="url(#accentGradient)"/>
    
    <!-- Compression lines -->
    <path d="M 8 15 L 12 15" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 8 18 L 12 18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 8 21 L 12 21" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Optimized compression lines (fewer) -->
    <path d="M 30 14 L 34 14" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M 30 18 L 34 18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  </g>
  
  <!-- Text: PixelSqueeze -->
  <text x="50" y="25" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="#1F2937">
    Pixel
  </text>
  <text x="50" y="42" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="url(#logoGradient)">
    Squeeze
  </text>
  
  <!-- Tagline -->
  <text x="50" y="54" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="400" fill="#6B7280">
    Optimize • Compress • Deliver
  </text>
</svg> 